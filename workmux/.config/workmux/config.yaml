nerdfont: true
# ⚠️ --dangerously-skip-permissions はClaude Codeの全権限チェックをスキップする。
# 自動化用途（workmux）で意図的に使用。他の用途では推奨しない。
agent: "env CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 claude --dangerously-skip-permissions"
window_prefix: "wm-"
post_create:
  - direnv allow || true

panes:
  - command: <agent>
    focus: true
# ステータス表示: tmux.confで管理（アイコン後のスペース確保のため）
status_format: false

# ステータスアイコン（Nerd Font対応）
status_icons:
  working: "󰚩"   # 処理中
  waiting: "󰔟"   # 入力待ち
  done: "󰄬"      # 完了
