nerdfont: true
agent: "env PATH=$HOME/.local/bin:$PATH CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 claude --dangerously-skip-permissions"
window_prefix: "wm-"

panes:
  - command: <agent>
    focus: true
# ステータス表示: tmux.confで管理（アイコン後のスペース確保のため）
status_format: false

# ステータスアイコン（Nerd Font対応）
status_icons:
  working: "󰚩"   # 処理中
  waiting: "󰔟"   # 入力待ち
  done: "󰄬"      # 完了
