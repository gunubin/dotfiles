##### 通知・パススルー設定 #####

# OSC通知対応（将来的な拡張用）
set -g allow-passthrough off

# bell検知設定
set -g monitor-bell on
set -g bell-action any

##### ステータスバーの位置・外観設定 #####

# TrueColor対応
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"
set-option -ga terminal-overrides ",xterm-ghostty:RGB:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g cursor-style blinking-block

# Nerd Fontアイコンの幅補正（workmux status icons）
# Ghosttyは2セル幅で描画するがtmuxはAmbiguous幅を1と見なすため明示指定
# F06A9=󰚩(robot/working), F051F=󰔟(timer-sand), F012C=󰄬(check)
set -as codepoint-widths "F06A9=2,F051F=2,F012C=2"

##### プレフィックス・基本操作の設定 #####
# 旧prefix解除・新prefixをCtrl+sに
unbind C-b
unbind C-s
set -g prefix C-s
bind-key C-s send-prefix

# エスケープのディレイ時間短縮（キー反応高速化）
set -sg escape-time 1

# ウィンドウ／ペイン番号を 1 始まりに
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じた時に番号を自動で詰める
set -g renumber-windows on

# 設定ファイルをリロードするバインド（prefix + r）
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Shift+Enterのキーシーケンスを送信（ターミナルアプリ対応）
bind -n S-Enter send-keys Escape "[13;2u"

##### ペイン操作・ナビゲーション #####

# 名前付きウィンドウ作成
bind N command-prompt "new-window -n '%%'"

# ペインの分割（同じディレクトリで開く）
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ペインの移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのサイズ変更（プレフィックス後1秒以内なら連続入力可能）
set -g repeat-time 1000
bind -r Up resize-pane -U 2
bind -r Down resize-pane -D 2
bind -r Left resize-pane -L 3
bind -r Right resize-pane -R 3

# ペインを閉じる
bind w if-shell "pgrep -xP #{pane_pid} claude" \
    "confirm-before -p 'Claude Code is running. Kill pane? (y/n)' kill-pane" \
    "kill-pane"

# Git操作をポップアップで開く（prefix + g）
# lazygitがあればlazygit、なければfzfでgit差分ビューア
bind g if-shell "command -v lazygit" \
    "display-popup -E -w 100% -h 100% -d '#{pane_current_path}' 'lazygit'" \
    "run-shell 'cd #{pane_current_path} && ~/.config/tmux/scripts/git-diff-viewer.sh; true'"

# fzfファイル検索ポップアップ（prefix + f）
bind f run-shell "cd #{pane_current_path} && ~/.config/tmux/scripts/fzf-find.sh #{pane_id}"

# yaziをポップアップで開く（prefix + e）
# tmux-toggle-popup で同一キーでトグル開閉（セッション蓄積問題を回避）
bind e run "#{@popup-toggle} -Ed'#{pane_current_path}' -w90% -h90% -b rounded -S 'fg=cyan' --name=yazi 'tmux setw pane-border-status off && yazi'"

# Persistent popup shell (prefix + Enter)
bind Enter run "#{@popup-toggle} -Ed'#{pane_current_path}' -w80% -h80% --name=shell 'tmux setw pane-border-status off && fish'"

# Persistent popup nvim (prefix + n)
bind n run "#{@popup-toggle} -Ed'#{pane_current_path}' -w80% -h80% --name=nvim 'tmux setw pane-border-status off && sleep 0.3 && nvim'"

# cc-pick MCP/プラグイン設定（prefix + c）
bind c display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/.config/tmux/scripts/cc-pick.sh"

# proclean 孤児プロセスキラー（prefix + P）
bind p display-popup -E -w 80% -h 80% "proclean"

# claude-panes ペイン単位モニター
#bind C-a run-shell 'tmux display-popup -E -h "70%" -w "60%" "CLAUDE_PANES_CALLER_PANE=#{pane_id} ~/.cargo/bin/claude-panes"'

# wma ポップアップ（prefix + d / Ghostty: cmd+d）
# workmux window or git worktree → 削除確認、それ以外 → 新規作成
bind d run-shell "fish ~/.config/tmux/scripts/wma-dispatch.fish '#{pane_current_path}' '#{window_name}'"

# workmux dashboard（prefix + C-a / Ghostty: cmd+s）
bind C-a display-popup -E -h 90% -w 90% "workmux dashboard"


##### ウィンドウ操作 #####

# ウィンドウ番号で移動（存在しない場合はポップアップで通知）
bind 0 run-shell "~/.config/tmux/scripts/select-window.sh 0"
bind 1 run-shell "~/.config/tmux/scripts/select-window.sh 1"
bind 2 run-shell "~/.config/tmux/scripts/select-window.sh 2"
bind 3 run-shell "~/.config/tmux/scripts/select-window.sh 3"
bind 4 run-shell "~/.config/tmux/scripts/select-window.sh 4"
bind 5 run-shell "~/.config/tmux/scripts/select-window.sh 5"
bind 6 run-shell "~/.config/tmux/scripts/select-window.sh 6"
bind 7 run-shell "~/.config/tmux/scripts/select-window.sh 7"
bind 8 run-shell "~/.config/tmux/scripts/select-window.sh 8"
bind 9 run-shell "~/.config/tmux/scripts/select-window.sh 9"

# ウィンドウリネームを簡単に
bind-key R command-prompt "rename-window %%"

bind-key C-c new-window -c "#{pane_current_path}"
bind-key C-k confirm-before kill-window
bind-key C-p if-shell "[ #{pane_index} -eq 1 ]" \
    "select-window -t :-" \
    "select-pane -t :.-"
bind-key C-n if-shell "[ #{pane_index} -eq #{window_panes} ]" \
    "select-window -t :+" \
    "select-pane -t :.+"

bind-key H move-window -t :-1
bind-key L move-window -t :+1

##### マウス設定 #####

setw -g mouse on
bind m setw -g mouse on \; display 'Mouse: ON'
bind M setw -g mouse off \; display 'Mouse: OFF'

# スクロール設定
set -g history-limit 50000  # スクロールバック上限を増やす

# auto restore
set -g @continuum-restore 'on'

##### コピーモード（vi風） #####

# viキーバインド
setw -g mode-keys vi

# 選択・コピー（pbcopy経由でmacOSのクリップボードへ）
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

bind -T copy-mode-vi C-a send -X start-of-line
bind -T copy-mode-vi C-e send -X end-of-line

##### プラグイン読み込み #####
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @catppuccin_flavor "mocha"
set -g @thm_bg "default"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
set -g @catppuccin_window_number_color "#{@thm_overlay_0}"

run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{tmux_mode_indicator}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?#{!=:#(~/.config/tmux/scripts/git-status-line.sh #{pane_current_path}),},│#[fg=#{@thm_peach}]  #(~/.config/tmux/scripts/git-status-line.sh #{pane_current_path}) ,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=#{@thm_green}] 󰓅 #{cpu_percentage}%"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰅐 %H:%M "

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane scrollbar
set -g pane-scrollbars on
set -gF pane-scrollbars-style "fg=#{@thm_sapphire},bg=#{@thm_surface_0},width=1"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format "#[fg=#{@thm_overlay_1}]#(~/.claude/scripts/pane-prompt.sh #{pane_id})#[align=right] #(echo '#{pane_id}' | tr -d '%%') "
setw -g pane-border-lines single
set -g @catppuccin_pane_border_style "##{?window_zoomed_flag,fg=#{@thm_yellow},fg=#{@thm_overlay_0}}"
set -g @catppuccin_pane_active_border_style "##{?window_zoomed_flag,fg=#{@thm_yellow},##{?pane_in_mode,fg=#{@thm_blue},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_blue}}}}"


set -wg automatic-rename off

# pane切替時にClaude Codeのウィンドウ名アイコンを追従させる
set-hook -g after-select-pane[0] 'run-shell -b "~/.claude/scripts/tmux-pane-focus.sh"'
# window閉鎖・pane閉鎖・session切替・re-attach時にもウィンドウ名を更新する
set-hook -g window-closed[0] 'run-shell -b "~/.claude/scripts/tmux-pane-focus.sh"'
set-hook -g after-kill-pane[0] 'run-shell -b "~/.claude/scripts/tmux-pane-focus.sh"'
set-hook -g session-changed[0] 'run-shell -b "~/.claude/scripts/tmux-pane-focus.sh"'
set-hook -g client-attached[0] 'run-shell -b "~/.claude/scripts/tmux-pane-focus.sh"'

set -g window-status-format "#{?#{==:#{@workmux_status},󰄬},#[fg=#{@thm_peach}],#{?#{==:#{@workmux_status},󰔟},#[fg=#{@thm_yellow}],}} #I#{?#{!=:#{window_name},Window},: #W,}#{?@workmux_status, #{@workmux_status} , } "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"
set -g window-status-activity-style "bg=default,fg=#{@thm_peach}"
set -g window-status-bell-style "bg=default,fg=#{@thm_peach},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,}#{?@workmux_status, #{@workmux_status} , } "
set -g window-status-current-style "bg=#{@thm_sky},fg=#{@thm_crust},bold"

set-environment -g TMUX_FZF_OPTIONS '-p -m --preview='
set-environment -g TMUX_FZF_PREVIEW 0
set-environment -g TMUX_FZF_PREVIEW_FOLLOW 0

# session list by tmux-fzf
bind-key o run-shell "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh"

###
# tmux-mode-indicator'
###
set -g @mode_indicator_prefix_prompt ' 󰘳 #S '
set -g @mode_indicator_copy_prompt ' 󰆏 COPY '
set -g @mode_indicator_sync_prompt ' 󰓦 SYNC '
set -g @mode_indicator_empty_prompt '  #S '
set -g @mode_indicator_empty_mode_style 'bg=#{@thm_bg},fg=#{@thm_green}'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'alexwforsythe/tmux-which-key' # The default prefix keybinding prefix + space
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'loichyan/tmux-toggle-popup'
# ポップアップをメインサーバーで実行（別サーバーだとprefix+[でcopy-modeに入れない）
set -gF @popup-socket-path '#{socket_path}'
set -g  @popup-on-init 'set status off; setw pane-border-status off'
set -g  @popup-id-format 'popup/#{b:pane_current_path}/{popup_name}'
# セッション選択でpopupセッションを除外
bind T choose-tree -sf '#{?#{m:popup/*,#{session_name}},0,1}'


run '~/.config/tmux/plugins/tpm/tpm'

